      "Administración", "Transporte Material Radiactivo",
      "Radiofármacos", "Asesorías","Almacenamiento", "Productos" , "Otros servicios"

    function cargarListas() {
      var clienteSelect = document.getElementById("cliente");
      var centroCostosSelect = document.getElementById("centro_costos");

      if (!clienteSelect || !centroCostosSelect) {
        console.error("❌ Error: No se encontraron los elementos <select>");
        return;
      }

      clientes.forEach(cliente => {
        var option = document.createElement("option");
        option.value = cliente;
        option.textContent = cliente;
        clienteSelect.appendChild(option);
      });

      centrosCostos.forEach(centro => {
        var option = document.createElement("option");
        option.value = centro;
        option.textContent = centro;
        centroCostosSelect.appendChild(option);
      });

      console.log("✅ Listas cargadas correctamente.");
    }

    function generarLineas() {
      var cantidad = document.getElementById("cantidad_lineas").value;
      var contenedor = document.getElementById("lineas");
      contenedor.innerHTML = "";

      for (var i = 0; i < cantidad; i++) {
        var div = document.createElement("div");
        div.innerHTML = '<input type="text" name="descripcion[]" placeholder="Descripción" required>';
        contenedor.appendChild(div);
      }
    }

    function enviarFormulario() {
    var form = document.getElementById("formulario");

    var cantidadLineas = document.getElementById("cantidad_lineas").value;
    var lineasContainer = document.getElementById("lineas");

    var fechaSolicitud = form["fecha_solicitud"].value;
    var centroCostos = form["centro_costos"].value;
    var cliente = form["cliente"].value;
    var numeroCotizacion = form["numero_cotizacion"].value;
    var linkCotizacion = form["link_cotizacion"].value;

    // Validaciones de campos obligatorios
    if (!fechaSolicitud || !centroCostos || !cliente || !numeroCotizacion || !linkCotizacion) {
        alert("⚠️ Por favor, complete todos los campos obligatorios.");
        return;
    }

    if (!cantidadLineas || cantidadLineas < 1 || lineasContainer.children.length === 0) {
        alert("⚠️ Debe agregar al menos una línea de descripción.");
        return;
    }

    var formData = new FormData(form);
    var jsonObject = {};  

    formData.forEach((value, key) => {
      if (!jsonObject[key]) {
        jsonObject[key] = value;
      } else {
        if (!Array.isArray(jsonObject[key])) {
          jsonObject[key] = [jsonObject[key]];
        }
        jsonObject[key].push(value);
      }
    });

    var boton = document.querySelector("button[onclick='enviarFormulario()']");
    boton.disabled = true;
    boton.textContent = "Enviando ...";

    google.script.run
      .withSuccessHandler(() => {
          alert("✅ Formulario enviado correctamente.");
          form.reset();
          document.getElementById("lineas").innerHTML = ""; // Limpiar líneas después de enviar
          boton.disabled = false;
          boton.textContent = "Enviar";
      })
      .withFailureHandler((error) => {
        alert("❌ Error al enviar: " + (error && error.message ? error.message : error));
        boton.disabled = false; boton.textContent = "Enviar";
      })
      .guardarDatos(jsonObject);
  }

<body>
  <div class="container">
    <h2>Formulario de Registro</h2>

    <p>Recuerde que todos los campos son obligatorios</p>
    <form id="formulario">
      <label>Fecha de solicitud:</label>
      <input type="date" name="fecha_solicitud" required><br><br>

      <label>Centro de costos:</label>
      <select id="centro_costos" name="centro_costos" required>
        <option value="" disabled selected>Seleccione una opción</option>
      </select><br><br>

      <label>Cliente:</label>
      <select id="cliente" name="cliente" required>
        <option value="" disabled selected>Seleccione un cliente</option>
      </select><br><br>

      <label>Cantidad de líneas:</label>
      <input type="number" id="cantidad_lineas" min="1" required>
      <button type="button" onclick="generarLineas()">Generar</button><br><br>

      <label>Detalles:</label>
      <div id="lineas" class="lineas-container"></div>

      <label>Número cotización</label>
      <input type="text" name="numero_cotizacion" id="numero_cotizacion" required>

      <label>Link cotización</label>
      <input type="url" name="link_cotizacion" id="link_cotizacion" required>

      <button type="button" onclick="enviarFormulario()">Enviar</button>
    </form>
  </div>
</body>
